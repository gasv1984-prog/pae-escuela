<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar Carnets - PAE</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Librería para generar el QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Volver al Menú</a>
        
        <div class="menu-card" style="align-items: flex-start;">
            <h2 style="width: 100%; text-align: center; margin-bottom: 20px;">Crear Carnet Estudiantil</h2>
            
            <form id="registroForm" style="width: 100%;">
                <div class="form-group">
                    <label for="documento">Documento de Identidad (Código Único):</label>
                    <input type="number" id="documento" required placeholder="Ej: 1009876543">
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                </div>

                <div class="form-group">
                    <label for="grado">Grado / Grupo:</label>
                    <select id="grado" required>
                        <option value="">Seleccione el grupo...</option>
                        <!-- Preescolar y Jardines -->
                        <option value="JARDIN QUINDOS">JARDÍN QUINDOS</option>
                        <option value="JARDIN POLICARPA">JARDÍN POLICARPA</option>
                        <option value="JARDIN ROSANA">JARDÍN ROSANA</option>
                        <option value="ACELERACION">ACELERACIÓN</option>
                        <option value="0-A">0-A (Transición)</option>
                        <option value="0-B">0-B (Transición)</option>
                        <option value="0-D">0-D (Transición)</option>
                        <option value="0-E">0-E (Transición)</option>
                        <option value="0-I">0-I (Transición)</option>
                        <option value="0-J">0-J (Transición)</option>
                        
                        <!-- Primaria Básica (1 - 5) -->
                        <option value="1-A">1-A</option>
                        <option value="1-B">1-B</option>
                        <option value="1-D">1-D</option>
                        <option value="1-E">1-E</option>
                        <option value="1-I">1-I</option>
                        
                        <option value="2-A">2-A</option>
                        <option value="2-B">2-B</option>
                        <option value="2-D">2-D</option>
                        <option value="2-E">2-E</option>
                        <option value="2-I">2-I</option>
                        <option value="2-J">2-J</option>
                        
                        <option value="3-A">3-A</option>
                        <option value="3-B">3-B</option>
                        <option value="3-D">3-D</option>
                        <option value="3-E">3-E</option>
                        <option value="3-I">3-I</option>
                        <option value="3-J">3-J</option>
                        
                        <option value="4-A">4-A</option>
                        <option value="4-B">4-B</option>
                        <option value="4-D">4-D</option>
                        <option value="4-E">4-E</option>
                        <option value="4-I">4-I</option>
                        <option value="4-J">4-J</option>
                        
                        <option value="5-A">5-A</option>
                        <option value="5-B">5-B</option>
                        <option value="5-D">5-D</option>
                        <option value="5-E">5-E</option>
                        <option value="5-I">5-I</option>
                        <option value="5-J">5-J</option>

                        <!-- Bachillerato (6 - 11) -->
                        <option value="6-A">6-A</option>
                        <option value="6-B">6-B</option>
                        <option value="6-D">6-D</option>
                        <option value="6-E">6-E</option>
                        <option value="6-I">6-I</option>
                        
                        <option value="7-A">7-A</option>
                        <option value="7-B">7-B</option>
                        <option value="7-D">7-D</option>
                        <option value="7-E">7-E</option>
                        
                        <option value="8-A">8-A</option>
                        <option value="8-B">8-B</option>
                        <option value="8-D">8-D</option>
                        
                        <option value="9-A">9-A</option>
                        <option value="9-B">9-B</option>
                        <option value="9-D">9-D</option>
                        <option value="9-E">9-E</option>
                        
                        <option value="10-A">10-A</option>
                        <option value="10-D">10-D</option>
                        <option value="10-E">10-E</option>
                        
                        <option value="11-A">11-A</option>
                        <option value="11-D">11-D</option>
                        <option value="11-D">11-D</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipo de Beneficiario:</label>
                    <select id="tipo" required>
                        <option value="Titular">Titular</option>
                        <option value="Suplente">Suplente</option>
                    </select>
                </div>

                <button type="submit" class="btn">Generar y Guardar Carnet</button>
            </form>

            <div id="carnetResult">
                <h3>Carnet Generado</h3>
                <p><strong><span id="resNombre"></span></strong> (<span id="resGrado"></span>)</p>
                <div id="qrcode"></div>
                <p style="font-size: 0.8rem; color: #666;">Doc: <span id="resDoc"></span></p>
                <button onclick="window.print()" class="btn" style="margin-top: 15px; background: #10B981;">Imprimir Carnet</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwz3SHQon_5TYorLV9MH8lXvNM4a0AR1b75b8_9YlmIMUmFJrM-6eVcI-a0piutEiSK/exec";

        // Lógica para generar el QR cuando se envía el formulario
        document.getElementById('registroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // 1. Obtener valores
            const doc = document.getElementById('documento').value;
            const nom = document.getElementById('nombre').value;
            const grad = document.getElementById('grado').value;
            const tip = document.getElementById('tipo').value;
            const btnSubmit = e.target.querySelector('button[type="submit"]');

            // 2. Cambiar estado del botón mientras guarda
            const textoOriginalBtn = btnSubmit.innerText;
            btnSubmit.innerText = "⏳ Guardando en Google Sheets...";
            btnSubmit.disabled = true;

            // 3. Enviar datos a Google Sheets
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Necesario para evitar bloqueos de CORS al enviar desde local
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'crear_estudiante',
                        documento: doc,
                        nombre: nom,
                        grado: grad,
                        tipo: tip
                    })
                });
                
                // Si llega aquí, se envió correctamente (no-cors no nos deja ver la respuesta exacta, asumimos éxito si no hay error de red)
                console.log("Estudiante guardado en Sheets.");

                // 4. Mostrar datos en el carnet visual
                document.getElementById('resNombre').innerText = nom;
                document.getElementById('resGrado').innerText = grad + " (" + tip + ")";
                document.getElementById('resDoc').innerText = doc;

                // 5. Limpiar código QR anterior si existe
                document.getElementById('qrcode').innerHTML = "";

                // 6. Generar el nuevo código QR (Solo guarda el documento como identificador)
                new QRCode(document.getElementById("qrcode"), {
                    text: doc, // El QR ESTRICTAMENTE SOLO TIENE EL NÚMERO
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // 7. Mostrar la tarjeta generada
                document.getElementById('carnetResult').style.display = 'block';
                
                // Limpiar formulario para el siguiente
                e.target.reset();

            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Hubo un error al intentar guardar en Google Sheets. Revisa tu conexión.");
            } finally {
                // Restaurar el botón
                btnSubmit.innerText = textoOriginalBtn;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
